<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FGL Parent Playbook · Companion Site</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2D9B14" />
<meta name="robots" content="noindex,nofollow" />
<style>
@font-face {
  font-family: "VAG Rounded";
  src: url("fonts/VAG Rounded Bold.otf") format("opentype");
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "VAG Rounded";
  src: url("fonts/VAG Rounded Light.otf") format("opentype");
  font-weight: 300; font-style: normal; font-display: swap;
}

:root {
  --fgl-green:        #2D9B14;
  --fgl-green-deep:   #1F6E0E;
  --fgl-green-soft:   #E8F5E3;
  --fgl-green-tint:   #F4FAF1;
  --fgl-orange:       #FF8000;
  --fgl-orange-deep:  #CC6600;
  --fgl-orange-soft:  #FFF1E0;

  --ink-1000: #0B0F0A;
  --ink-900:  #1A1F1B;
  --ink-700:  #3E4842;
  --ink-500:  #6B7280;
  --ink-300:  #B8BEB6;
  --ink-200:  #D8DCD7;
  --ink-100:  #EEF0ED;
  --ink-50:   #F6F7F5;

  --font-head: "VAG Rounded", "Arial Rounded MT Bold", Arial, system-ui, sans-serif;
  --font-body: "VAG Rounded", Arial, system-ui, sans-serif;
  --tr-eyebrow: 0.14em;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: #fff;
  color: var(--ink-900);
  font-family: var(--font-body);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, h5 {
  font-family: var(--font-head);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink-1000);
  line-height: 1.1;
  margin: 0;
}
p { margin: 0; }
a { color: inherit; text-decoration: none; }

.eyebrow {
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: var(--tr-eyebrow); text-transform: uppercase;
  color: var(--fgl-green-deep);
}

.phone {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-1000);
  position: relative;
  min-height: 100vh;
}

.tb {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--ink-100);
  background: #fff;
  position: sticky; top: 0; z-index: 20;
}
.tb__brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-1000);
}
.tb__back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-1000);
}
.tb__back::before {
  content: '‹';
  font-size: 18px; line-height: 1;
  color: var(--fgl-green);
}
.tb__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fgl-green);
}
.tb__menu {
  width: 28px; height: 18px; position: relative;
}
.tb__menu::before, .tb__menu::after, .tb__menu i {
  content: ''; position: absolute; left: 0; right: 0;
  height: 2px; background: var(--ink-1000); border-radius: 1px;
  display: block;
}
.tb__menu::before { top: 2px; }
.tb__menu i { top: 8px; }
.tb__menu::after { bottom: 2px; }

.tile {
  display: block;
  border: 1px solid var(--ink-200);
  border-radius: 14px;
  background: #fff;
  padding: 18px 18px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.tile__num {
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-500);
}
.tile__word {
  font-family: var(--font-head); font-weight: 700;
  font-size: 38px; line-height: 1;
  letter-spacing: -0.02em;
  color: var(--fgl-green-deep);
  margin-top: 4px;
}
.tile__sub {
  font-family: var(--font-body);
  font-size: 13px; line-height: 1.4;
  color: var(--ink-700);
  margin-top: 6px;
}
.tile__count {
  margin-top: 12px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-500);
}
.tile__arrow {
  position: absolute; right: 16px; top: 18px;
  font-family: var(--font-head); font-weight: 700; font-size: 22px;
  color: var(--fgl-green);
  line-height: 1;
}

.hero-green {
  background: var(--fgl-green);
  color: #fff;
  padding: 32px 22px 28px;
}
.hero-green__brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,.85);
  margin-bottom: 22px;
}
.hero-green__brand .d { width: 7px; height: 7px; border-radius: 50%; background: #fff; }
.hero-green__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 44px; line-height: 0.95;
  letter-spacing: -0.025em;
  color: #fff;
}
.hero-green__tag {
  margin-top: 14px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 13px; letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fgl-orange);
  display: inline-block;
  padding: 6px 10px 5px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 999px;
}
.hero-green__sub {
  margin-top: 12px;
  font-family: var(--font-body);
  font-size: 14px; line-height: 1.5;
  color: rgba(255,255,255,.95);
  max-width: 28ch;
}

.opener {
  background: var(--fgl-green);
  color: #fff;
  padding: 26px 22px 28px;
  position: relative;
  overflow: hidden;
}
.opener__eyebrow {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,.85);
  margin-bottom: 18px;
}
.opener__num {
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.22em;
  color: rgba(255,255,255,.85);
}
.opener__word {
  font-family: var(--font-head); font-weight: 700;
  font-size: 76px; line-height: 0.9;
  letter-spacing: -0.03em;
  color: #fff;
  margin-top: 4px;
}
.opener__sub {
  margin-top: 14px;
  font-family: var(--font-body);
  font-size: 15px; line-height: 1.4;
  color: rgba(255,255,255,.95);
  max-width: 26ch;
}

.sh { padding: 26px 22px 6px; }
.sh__eyebrow {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-green-deep);
  margin-bottom: 8px;
}
.sh__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 26px; line-height: 1.05;
  letter-spacing: -0.015em;
  color: var(--ink-1000);
}
.sh__lead {
  margin-top: 10px;
  font-family: var(--font-body);
  font-size: 15px; line-height: 1.5;
  color: var(--ink-900);
}

.body-pad { padding: 0 22px; }

.step {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 14px;
  align-items: start;
  padding: 14px 0;
  border-bottom: 1px solid var(--ink-100);
  cursor: pointer;
  user-select: none;
}
.step:last-child { border-bottom: none; }
.step__num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--fgl-green); color: #fff;
  font-family: var(--font-head); font-weight: 700;
  font-size: 14px; line-height: 32px; text-align: center;
  flex-shrink: 0;
  transition: background 180ms ease;
}
.step__body {
  font-family: var(--font-body);
  font-size: 14.5px; line-height: 1.45;
  color: var(--ink-1000);
  padding-top: 5px;
}
.step__crit {
  display: inline-block;
  margin-top: 4px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--fgl-orange-deep);
  background: var(--fgl-orange-soft);
  padding: 3px 7px;
  border-radius: 4px;
}
.step.is-checked .step__num { background: var(--ink-300); }
.step.is-checked .step__body {
  color: var(--ink-500);
  text-decoration: line-through;
  text-decoration-color: var(--ink-300);
}

.watchfor {
  margin: 18px 22px 0;
  padding: 16px 18px;
  background: var(--fgl-orange-soft);
  border-left: 3px solid var(--fgl-orange);
  border-radius: 0 10px 10px 0;
}
.watchfor__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-orange-deep);
  margin-bottom: 8px;
}
.watchfor ul {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.watchfor li {
  font-family: var(--font-body);
  font-size: 13.5px; line-height: 1.4;
  color: var(--ink-1000);
  padding-left: 14px;
  position: relative;
}
.watchfor li::before {
  content: ''; position: absolute; left: 0; top: 8px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--fgl-orange);
}

.cue {
  margin: 18px 22px 0;
  padding: 16px 18px;
  background: var(--fgl-green-tint);
  border-left: 3px solid var(--fgl-green);
  border-radius: 0 10px 10px 0;
}
.cue__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-green-deep);
  margin-bottom: 8px;
}
.cue__quote {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 14.5px; line-height: 1.45;
  color: var(--ink-1000);
}

.askdeck {
  margin: 14px 22px 0;
  display: flex; flex-direction: column; gap: 10px;
}
.askcard {
  perspective: 800px;
  height: 110px;
  cursor: pointer;
}
.askcard__inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 480ms cubic-bezier(.2,.7,.2,1);
}
.askcard.is-flipped .askcard__inner { transform: rotateY(180deg); }
.askcard__face {
  position: absolute; inset: 0;
  border-radius: 12px;
  padding: 14px 16px;
  backface-visibility: hidden;
  display: flex; flex-direction: column; justify-content: center;
  font-family: var(--font-body);
  font-size: 14px; line-height: 1.4;
}
.askcard__face--front {
  background: #fff;
  border: 1px solid var(--ink-200);
  color: var(--ink-1000);
}
.askcard__face--back {
  background: var(--ink-1000);
  color: #fff;
  transform: rotateY(180deg);
}
.askcard__q {
  font-family: var(--font-head); font-weight: 700;
  font-size: 14.5px;
  color: var(--ink-1000);
  letter-spacing: -0.005em;
}
.askcard__hint {
  margin-top: 8px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-green-deep);
}
.askcard__a {
  font-family: var(--font-body);
  font-size: 13px; line-height: 1.45;
  color: rgba(255,255,255,.95);
}
.askcard__alabel {
  font-family: var(--font-head); font-weight: 700;
  font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-orange);
  margin-bottom: 6px;
}

.man { border-bottom: 1px solid var(--ink-100); }
.man:last-of-type { border-bottom: none; }
.man__head {
  padding: 18px 22px;
  display: grid;
  grid-template-columns: 38px 1fr 18px;
  gap: 14px;
  align-items: center;
  cursor: pointer;
  background: #fff;
}
.man__num {
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.18em;
  color: var(--ink-500);
  text-transform: uppercase;
}
.man__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 18px; line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--ink-1000);
}
.man__crit {
  display: inline-block;
  margin-top: 5px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-orange-deep);
  background: var(--fgl-orange-soft);
  padding: 3px 7px;
  border-radius: 4px;
}
.man__chev {
  font-family: var(--font-head); font-weight: 700;
  font-size: 18px;
  color: var(--fgl-green);
  transition: transform 220ms ease;
  text-align: center;
}
.man.is-open .man__chev { transform: rotate(90deg); }
.man__body { display: none; padding-bottom: 8px; background: var(--ink-50); }
.man.is-open .man__body { display: block; }

.man__close {
  margin: 18px 22px 8px;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 14px 18px;
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: 12px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-1000);
  cursor: pointer;
  width: calc(100% - 44px);
}
.man__close::before {
  content: '▲';
  color: var(--fgl-green);
  font-size: 10px;
}

.backtop {
  position: fixed;
  right: 14px; bottom: 18px;
  z-index: 30;
  padding: 11px 16px 10px;
  background: var(--ink-1000);
  color: #fff;
  border: none;
  border-radius: 999px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
  display: inline-flex; align-items: center; gap: 8px;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
.backtop.is-visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.backtop::before {
  content: '↑';
  font-size: 14px;
  color: var(--fgl-orange);
}

.video {
  margin: 18px 22px 0;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 16 / 9;
  background: #0B0F0A;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.video iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
}
.video__placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: rgba(255,255,255,.95);
  text-align: center;
}
.video__play {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,.18);
  border: 2px solid rgba(255,255,255,.6);
  display: flex; align-items: center; justify-content: center;
}
.video__play::after {
  content: '';
  width: 0; height: 0;
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  margin-left: 4px;
}
.video__label {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,.8);
}

.proc-title {
  margin: 22px 22px 4px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--fgl-green-deep);
}

.fend {
  padding: 28px 22px 36px;
  text-align: center;
  border-top: 1px solid var(--ink-100);
  margin-top: 32px;
}
.fend__url {
  font-family: var(--font-head); font-weight: 700;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--fgl-green-deep);
}
.fend__c {
  margin-top: 6px;
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--ink-500);
}

.sketch {
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.ttile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px 18px 6px;
}
.ttile {
  position: relative;
  text-align: left;
  background: #fff;
  border: 1px solid var(--ink-100);
  border-radius: 14px;
  padding: 14px 14px 14px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: transform .12s ease, border-color .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 118px;
}
.ttile:hover {
  border-color: var(--fgl-green);
  box-shadow: 0 4px 14px rgba(45,155,20,.10);
  transform: translateY(-1px);
}
.ttile:active { transform: translateY(0); }
.ttile__num {
  font-family: var(--font-head); font-weight: 700;
  font-size: 22px;
  color: var(--fgl-green);
  letter-spacing: -0.02em;
  line-height: 1;
}
.ttile__title {
  font-family: var(--font-head); font-weight: 700;
  font-size: 14.5px; line-height: 1.2;
  color: var(--ink-1000);
  letter-spacing: -0.01em;
}
.ttile__crit {
  display: inline-block;
  align-self: flex-start;
  font-family: var(--font-head); font-weight: 700;
  font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fgl-orange);
  background: var(--fgl-orange-soft);
  padding: 3px 7px 2px;
  border-radius: 999px;
}
.ttile__cta {
  margin-top: auto;
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fgl-green);
}
.ttile.is-crit {
  background: linear-gradient(180deg, #fff 0%, #fffaf2 100%);
}

.pact {
  margin: 28px 18px 0;
  padding: 26px 24px 28px;
  background: var(--fgl-green);
  color: #fff;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
}
.pact::after {
  content: "";
  position: absolute;
  right: -50px; top: -50px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
  pointer-events: none;
}
.pact__eyebrow {
  position: relative;
  font-family: var(--font-head); font-weight: 700;
  font-size: 10.5px; letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fgl-orange);
  margin-bottom: 10px;
}
.pact__num {
  position: relative;
  display: flex; align-items: baseline; gap: 10px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 84px; line-height: 0.85;
  letter-spacing: -0.04em;
  color: #fff;
}
.pact__num span {
  font-size: 20px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,.85);
  text-transform: lowercase;
  font-weight: 700;
}
.pact__title {
  position: relative;
  margin-top: 12px;
  font-family: var(--font-head); font-weight: 700;
  font-size: 22px; line-height: 1.15;
  letter-spacing: -0.01em;
  color: #fff;
}
.pact__lead {
  position: relative;
  margin-top: 10px;
  font-family: var(--font-body); font-weight: 300;
  font-size: 14px; line-height: 1.5;
  color: rgba(255,255,255,.92);
  max-width: 32ch;
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@10.22.0/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@10.22.0/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

<script>
(function () {
  var h = preact.h;
  var render = preact.render;
  var Fragment = preact.Fragment;
  var useState = preactHooks.useState;
  var useEffect = preactHooks.useEffect;
  var useRef = preactHooks.useRef;
  var useCallback = preactHooks.useCallback;
  var html = htm.bind(h);

  /* ============================================================
     LESSON DATA — sourced from the Parent Playbook manuscript
     ============================================================ */
  var LESSONS = [
    {
      id: 1, num: "01", name: "START",
      subtitle: "Vehicle familiarization & basic skills",
      cue: "Ask, don't direct. \"What do you see ahead?\" — their eyes go where their words go.",
      nextHook: "Up next — Lesson 2 · Park",

  var Sketch = {
    Wheel: Wheel, Backout: Backout, ParkSpace: ParkSpace, Stop: StopSketch,
    Speed: Speed, Parallel: Parallel, KTurn: KTurn, Merge: Merge,

  /* ============================================================
     ROUTER
     ============================================================ */
  function useHashRoute() {
    var initial = window.location.hash.replace(/^#/, "") || "home";
    var s = useState(initial);
    var route = s[0], setRoute = s[1];
    useEffect(function () {
      function onHash() {
        setRoute(window.location.hash.replace(/^#/, "") || "home");
        window.scrollTo(0, 0);
      }
      window.addEventListener("hashchange", onHash);
      return function () { window.removeEventListener("hashchange", onHash); };
    }, []);
    return route;
  }

  /* ============================================================
     SHARED COMPONENTS
     ============================================================ */
  function TopBarHome() {
    return html`<div class="tb">
      <div class="tb__brand"><span class="tb__dot"></span>FGL Parent Playbook</div>
      <div class="tb__menu"><i></i></div>
    </div>`;
  }

  function TopBarLesson() {
    return html`<div class="tb">
      <a class="tb__back" href="#">Back to Lessons</a>
      <div class="tb__menu"><i></i></div>
    </div>`;
  }

  function LessonTile(props) {
    var l = props.lesson;
    return html`<a class="tile" href=${"#lesson-" + l.id}>
      <div>
        <div class="tile__num">Lesson ${l.num}</div>
        <div class="tile__word">${l.name}</div>
        <div class="tile__sub">${l.subtitle}</div>
      </div>
      <div class="tile__count">${l.maneuvers.length} maneuvers</div>
      <div class="tile__arrow">›</div>
    </a>`;
  }

  /* ============================================================
     HOMEPAGE
     ============================================================ */
  function HomeView() {
    return html`<div class="phone">
      <${TopBarHome} />
      <div class="hero-green">
        <div class="hero-green__brand"><span class="d"></span>Fresh Green Light</div>
        <div class="hero-green__title">Parent<br/>Playbook.</div>
        <div class="hero-green__tag">For the parent in the passenger seat.</div>
        <div class="hero-green__sub">Coaching your teen through driver education — between every lesson.</div>
      </div>
      <div class="sh">
        <div class="sh__eyebrow">The four lessons</div>
        <div class="sh__title">Pick a lesson to practice.</div>
        <div class="sh__lead">Each chapter mirrors what your student just learned with the FGL instructor — same procedures, same words.</div>
      </div>
      <div class="body-pad" style=${{ display: "flex", flexDirection: "column", gap: "12px", paddingTop: "18px" }}>
        ${LESSONS.map(function (l) { return html`<${LessonTile} key=${l.id} lesson=${l} />`; })}
      </div>
      <div class="fend">
        <div class="fend__url">www.freshgreenlight.com</div>
        <div class="fend__c">FGL BTW 3.0 · Parent Playbook · v.1</div>
      </div>
    </div>`;
  }

  /* ============================================================
     LESSON SUB-COMPONENTS
     ============================================================ */
  function StepRow(props) {
    var s = useState(false);
    var checked = s[0], setChecked = s[1];
    var step = props.step, idx = props.idx;
    var isObj = typeof step === "object";
    var text = isObj ? step.t : step;
    var crit = isObj && step.crit;
    return html`<div class=${"step " + (checked ? "is-checked" : "")} onClick=${function () { setChecked(!checked); }}>
      <div class="step__num">${idx + 1}</div>
      <div class="step__body">
        ${text}
        ${crit && html`<div><span class="step__crit">Critical Skill</span></div>`}
      </div>
    </div>`;
  }

  function AskCard(props) {
    var s = useState(false);
    var flipped = s[0], setFlipped = s[1];
    return html`<div class=${"askcard " + (flipped ? "is-flipped" : "")} onClick=${function () { setFlipped(!flipped); }}>
      <div class="askcard__inner">
        <div class="askcard__face askcard__face--front">
          <div class="askcard__q">"${props.q}"</div>
          <div class="askcard__hint">Tap to flip ›</div>
        </div>
        <div class="askcard__face askcard__face--back">
          <div class="askcard__alabel">Listen for</div>
          <div class="askcard__a">${props.a}</div>
        </div>
      </div>
    </div>`;
  }

  function VideoSlot(props) {
    if (props.vimeoId) {
      return html`<div class="video">
        <iframe src=${"https://player.vimeo.com/video/" + props.vimeoId} allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>`;
    }
    return html`<div class="video">
      <div class="video__placeholder">
        <div class="video__play"></div>
        <div class="video__label">${props.label || "Video tutorial"}</div>
      </div>
    </div>`;
  }

  function ManeuverCard(props) {
    var m = props.m, open = props.open, onToggle = props.onToggle, onClose = props.onClose, anchorId = props.anchorId;
    var SketchIcon = Sketch[m.sketch];
    return html`<div class=${"man " + (open ? "is-open" : "")} id=${anchorId}>
      <div class="man__head" onClick=${onToggle}>
        <div class="man__num">${m.n}</div>
        <div>
          <div class="man__title">${m.title}</div>
          ${m.critical && html`<span class="man__crit">Road Test Critical</span>`}
        </div>
        <div class="man__chev">›</div>
      </div>
      ${open && html`<div class="man__body">
        <div style=${{ padding: "18px 22px 0", color: "var(--ink-700)" }}>
          <p style=${{ fontSize: "14px", lineHeight: 1.5 }}>${m.intro}</p>
        </div>
        ${m.vimeoId && html`<${VideoSlot} vimeoId=${m.vimeoId} label=${m.title + " · tutorial"} />`}
        <div class="proc-title">${m.procLabel} · tap to check off</div>
        <div class="body-pad">
          ${m.procedure.map(function (s, i) { return html`<${StepRow} key=${i} step=${s} idx=${i} />`; })}
        </div>
        <div class="watchfor">
          <div class="watchfor__title">Watch for</div>
          <ul>${m.watchFor.map(function (w, i) { return html`<li key=${i}>${w}</li>`; })}</ul>
        </div>
        <div style=${{ padding: "22px 22px 4px" }}>
          <div class="eyebrow" style=${{ marginBottom: "6px" }}>Ask your driver</div>
          <div style=${{ fontSize: "12px", color: "var(--ink-500)" }}>Tap a card to flip — hear what to listen for.</div>
        </div>
        <div class="askdeck">
          ${m.ask.map(function (a, i) { return html`<${AskCard} key=${i} q=${a.q} a=${a.a} />`; })}
        </div>
        <button class="man__close" onClick=${onClose} type="button">Close drill</button>
      </div>`}
    </div>`;
  }

  function TargetTile(props) {
    return html`<button class=${"ttile " + (props.critical ? "is-crit" : "")} onClick=${props.onJump} type="button">
      <div class="ttile__num">${String(props.idx).padStart(2, "0")}</div>
      <div class="ttile__title">${props.title}</div>
      ${props.critical && html`<div class="ttile__crit">Road Test Critical</div>`}
      <div class="ttile__cta">Jump to drill ›</div>
    </button>`;
  }

  /* ============================================================
     LESSON VIEW
     ============================================================ */
  function LessonView(props) {
    var lesson = props.lesson;
    var s = useState(0);
    var openIdx = s[0], setOpenIdx = s[1];
    var drillsAnchorRef = useRef(null);

    var jumpTo = useCallback(function (i) {
      setOpenIdx(i);
      setTimeout(function () {
        var el = document.getElementById("m-" + lesson.id + "-" + i);
        if (el) {
          var top = el.getBoundingClientRect().top + window.scrollY - 60;
          window.scrollTo({ top: top, behavior: "smooth" });
        }
      }, 60);
    }, [lesson.id]);

    var closeDrill = useCallback(function () {
      var i = openIdx;
      setOpenIdx(-1);
      setTimeout(function () {
        var el = document.getElementById("m-" + lesson.id + "-" + i);
        if (el) {
          var top = el.getBoundingClientRect().top + window.scrollY - 60;
          window.scrollTo({ top: top, behavior: "smooth" });
        }
      }, 40);
    }, [openIdx, lesson.id]);

    var backToDrills = useCallback(function () {
      var el = drillsAnchorRef.current;
      if (el) {
        var top = el.getBoundingClientRect().top + window.scrollY - 12;
        window.scrollTo({ top: top, behavior: "smooth" });
      }
    }, []);

    var drillIsOpen = openIdx >= 0;
    var nextLabel = lesson.nextHook.replace(/^Up next — /, "").replace(/^After this — /, "");

    return html`<div class="phone">
      <${TopBarLesson} />
      <div class="opener">
        <div class="opener__eyebrow">FGL Parent Playbook</div>
        <div class="opener__num">Lesson ${lesson.num}</div>
        <div class="opener__word">${lesson.name}</div>
        <div class="opener__sub">${lesson.subtitle}</div>
      </div>

      <div class="sh" style=${{ paddingTop: "24px" }} ref=${drillsAnchorRef}>
        <div class="sh__eyebrow">Today's drills</div>
        <div class="sh__title">Practice these before ${nextLabel}.</div>
        <div class="sh__lead">Tap a tile to jump straight to the drill.</div>
      </div>
      <div class="ttile-grid">
        ${lesson.maneuvers.map(function (m, i) {
          return html`<${TargetTile}
            key=${m.n}
            idx=${i + 1}
            title=${m.title}
            critical=${m.critical}
            onJump=${function () { jumpTo(i); }}
          />`;
        })}
      </div>

      <div class="cue">
        <div class="cue__title">Coach cue</div>
        <div class="cue__quote">"${lesson.cue}"</div>
      </div>

      <div style=${{ marginTop: "18px" }}>
        <div class="sh">
          <div class="sh__eyebrow">The drills</div>
          <div class="sh__title">Tap any to expand.</div>
        </div>
        <div style=${{ marginTop: "12px", borderTop: "1px solid var(--ink-100)" }}>
          ${lesson.maneuvers.map(function (m, i) {
            return html`<${ManeuverCard}
              key=${m.n}
              m=${m}
              open=${openIdx === i}
              onToggle=${function () { setOpenIdx(openIdx === i ? -1 : i); }}
              onClose=${closeDrill}
              anchorId=${"m-" + lesson.id + "-" + i}
            />`;
          })}
        </div>
      </div>

      <div class="pact">
        <div class="pact__eyebrow">Between every lesson</div>
        <div class="pact__num">8<span>hrs</span></div>
        <div class="pact__title">Of supervised practice. That's the goal.</div>
        <div class="pact__lead">The eight hours your teen spends with FGL is the foundation. The hours you spend together is what builds the actual driver.</div>
      </div>

      <div class="fend">
        <div class="fend__url">www.freshgreenlight.com</div>
        <div class="fend__c">FGL BTW 3.0 · Lesson ${lesson.num} · ${lesson.name}</div>
      </div>

      <button
        type="button"
        class=${"backtop " + (drillIsOpen ? "is-visible" : "")}
        onClick=${backToDrills}
        aria-label="Back to drills"
      >Drills</button>
    </div>`;
  }

  /* ============================================================
     APP
     ============================================================ */
  function App() {
    var route = useHashRoute();
    var m = route.match(/^lesson-(\d+)$/);
    if (m) {
      var id = parseInt(m[1], 10);
      for (var i = 0; i < LESSONS.length; i++) {
        if (LESSONS[i].id === id) {
          return html`<${LessonView} lesson=${LESSONS[i]} />`;
        }
      }
    }
    return html`<${HomeView} />`;
  }

  render(h(App, null), document.getElementById("root"));
})();
</script>
